<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFetch - Direct YouTube Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin: 0 auto;
        }
        h1 { color: #ff0000; margin-bottom: 5px; }
        .subtitle { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        input[type="text"] {
            width: 85%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #ff0000; }
        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #cc0000; }
        #result { margin-top: 30px; }
        .loading { color: #ffaa00; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>StreamFetch</h1>
    <div class="subtitle">100% Pure Direct YouTube Downloader Without Redirects or Ads</div>
    
    <input type="text" id="videoUrl" placeholder="Paste YouTube video link here...">
    <br>
    <button onclick="startDownload()">Download Video</button>

    <div id="result"></div>
</div>

<script>
function startDownload() {
    const urlInput = document.getElementById('videoUrl').value.trim();
    const resultDiv = document.getElementById('result');
    
    if (!urlInput) {
        alert("Please enter a valid YouTube link!");
        return;
    }

    resultDiv.innerHTML = "<p class='loading'>📥 Your download has started! Please wait a moment for the browser to trigger the file save...</p>";

    // වෙනත් කිසිම වෙබ් පේජ් එකකට නොයා, සයිට් එක ඇතුළෙන්ම කෙලින්ම බ්‍රවුසර් එකට ෆයිල් එක තල්ලු කිරීම
    window.location.href = `/download?url=${encodeURIComponent(urlInput)}`;
}
</script>

</body>
</html>

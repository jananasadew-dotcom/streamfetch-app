<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFetch - Real Direct Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
        }
        .container {
            max-width: 600px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { color: #ff0000; }
        input[type="text"] {
            width: 85%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 16px;
        }
        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
        }
        button:hover { background-color: #cc0000; }
        #result { margin-top: 30px; }
        .loading { color: #ffaa00; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>StreamFetch</h1>
    <p>100% Direct YouTube Downloader without any Ads or Redirects</p>
    
    <input type="text" id="videoUrl" placeholder="Paste YouTube video link here...">
    <br>
    <button onclick="downloadVideo()">Download Now</button>

    <div id="result"></div>
</div>

<script>
function downloadVideo() {
    const urlInput = document.getElementById('videoUrl').value.trim();
    const resultDiv = document.getElementById('result');
    
    if (!urlInput) {
        alert("Please enter a YouTube link!");
        return;
    }

    resultDiv.innerHTML = "<p class='loading'>📥 Downloading via your own server... Please wait, your file will appear shortly!</p>";

    // Triggering download straight from your server domain without opening new tabs
    window.location.href = `/download?url=${encodeURIComponent(urlInput)}`;
}
</script>

</body>
</html>

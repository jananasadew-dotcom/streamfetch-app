<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFetch - YouTube Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin: 0 auto;
        }
        h1 { color: #ff0000; margin-bottom: 5px; }
        .subtitle { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        input[type="text"] {
            width: 85%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #ff0000; }
        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #cc0000; }
        #result { margin-top: 30px; }
        .loading { color: #ffaa00; font-weight: bold; }
        .error { color: #ff3333; font-weight: bold; }
        
        /* ඩවුන්ලෝඩ් බටන්ස් ලස්සන කිරීම */
        .dl-box {
            background: #252525;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        .dl-link {
            display: block;
            background: #00adb5;
            color: #fff;
            padding: 12px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
        }
        .dl-link:hover { background: #008c95; }
        .dl-audio { background: #ff5722; }
        .dl-audio:hover { background: #e64a19; }
    </style>
</head>
<body>

<div class="container">
    <h1>StreamFetch</h1>
    <div class="subtitle">YouTube වීඩියෝ සහ සින්දු සැනසීමෙන් බාගත කරගන්න</div>
    
    <input type="text" id="videoUrl" placeholder="YouTube වීඩියෝ ලින්ක් එක මෙතනට පේස්ට් කරන්න...">
    <br>
    <button onclick="fetchVideo()">Fetch Video</button>

    <div id="result"></div>
</div>

<script>
function fetchVideo() {
    const urlInput = document.getElementById('videoUrl').value.trim();
    const resultDiv = document.getElementById('result');
    
    if (!urlInput) {
        resultDiv.innerHTML = "<p class='error'>කරුණාකර YouTube ලින්ක් එකක් ඇතුළත් කරන්න!</p>";
        return;
    }

    resultDiv.innerHTML = "<p class='loading'>වීඩියෝව විශ්ලේෂණය කරමින් පවතී. සුළු මොහොතක් රැඳී සිටින්න...</p>";

    // YouTube URL එකෙන් ID එක වෙන් කර ගැනීම
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = urlInput.match(regExp);
    
    if (match && match[2].length == 11) {
        const videoId = match[2];
        
        // 100%ක් ආරක්ෂිත බාහිර ඩවුන්ලෝඩර් සේවා ලින්ක්ස් (No-iframe, ඍජු බොත්තම්)
        const mp4_720 = `https://tw0b.com/api/widget/v2/${videoId}`;
        const mp3_link = `https://convert2mp3s.com/api/widget/v2/${videoId}`;

        resultDiv.innerHTML = `
            <div class="dl-box">
                <h3 style="color:#00adb5; margin-top:0;">වීඩියෝව සූදානම්! 🥳</h3>
                <p style="font-size:14px; color:#aaa;">පල්ලෙහා තියෙන බටන් එකක් ක්ලික් කරලා ඔයාගේ සයිට් එක ඇතුළෙන්ම බාගත කරගන්න:</p>
                <div class="btn-group">
                    <a href="https://v3.mp3youtube.cc/download/${videoId}/mp4/720" target="_blank" class="dl-link">🎬 Download MP4 (Video HD)</a>
                    <a href="https://v3.mp3youtube.cc/download/${videoId}/mp4/360" target="_blank" class="dl-link" style="background:#007acc;">🎥 Download MP4 (Video 360p)</a>
                    <a href="https://v3.mp3youtube.cc/download/${videoId}/mp3/128" target="_blank" class="dl-link dl-audio">🎵 Download MP3 (Audio)</a>
                </div>
            </div>
        `;
    } else {
        resultDiv.innerHTML = "<p class='error'>ඇතුළත් කල YouTube ලින්ක් එක වැරදියි! නැවත නිවැරදි ලින්ක් එකක් දමා උත්සාහ කරන්න.</p>";
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFetch - YouTube Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin: 0 auto;
        }
        h1 { color: #ff0000; }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 16px;
        }
        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #cc0000; }
        #result { margin-top: 30px; }
        .download-btn {
            display: inline-block;
            background-color: #00bcd4;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
        }
        .error { color: #ff3333; margin-top: 15px; }
        .loading { color: #ffaa00; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>StreamFetch</h1>
    <p>YouTube වීඩියෝ ලින්ක් එක පේස්ට් කරලා සැනසීමෙන් බාගත කරගන්න.</p>
    
    <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
    <br>
    <button onclick="fetchVideo()">Fetch Video</button>

    <div id="result"></div>
</div>

<script>
async function fetchVideo() {
    const urlInput = document.getElementById('videoUrl').value;
    const resultDiv = document.getElementById('result');
    
    if (!urlInput) {
        resultDiv.innerHTML = "<p class='error'>කරුණාකර YouTube ලින්ක් එකක් ඇතුළත් කරන්න!</p>";
        return;
    }

    resultDiv.innerHTML = "<p class='loading'>වීඩියෝව සොයමින් පවතී, සුළු මොහොතක් රැඳී සිටින්න...</p>";

    // YouTube URL එකෙන් ID එක විතරක් වෙන් කර ගැනීම
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = urlInput.match(regExp);
    
    if (match && match[2].length == 11) {
        const videoId = match[2];
        
        // නොමිලේ දෙන ආරක්ෂිත YouTube Downloader API එකක් පාවිච්ចි කිරීම
        const apiUrl = `https://api.v02.api-host.me/api/widget/v2/${videoId}`;
        
        resultDiv.innerHTML = `
            <h3>වීඩියෝව සූදානම්!</h3>
            <p>පල්ලෙහා තියෙන බටන් එක ඔබලා ඔයාට කැමති Quality එකකින් ඩවුන්ලෝඩ් කරගන්න:</p>
            <iframe src="${apiUrl}" width="100%" height="150px" style="border:none; border-radius:10px; background:#fff;"></iframe>
        `;
    } else {
        resultDiv.innerHTML = "<p class='error'>ඇතුළත් කල YouTube ලින්ක් එක වැරදියි! නැවත උත්සාහ කරන්න.</p>";
    }
}
</script>

</body>
</html>

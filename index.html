<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFetch - Clean YouTube Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin: 0 auto;
        }
        h1 { color: #ff0000; margin-bottom: 5px; }
        .subtitle { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        input[type="text"] {
            width: 85%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #ff0000; }
        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #cc0000; }
        #result { margin-top: 30px; }
        .error { color: #ff3333; font-weight: bold; }
        
        .dl-box {
            background: #252525;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        iframe {
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            background: transparent;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>StreamFetch</h1>
    <div class="subtitle">Fast & Reliable YouTube Video Downloader</div>
    
    <input type="text" id="videoUrl" placeholder="Paste YouTube video link here...">
    <br>
    <button onclick="processVideo()">Fetch Video</button>

    <div id="result"></div>
</div>

<script>
function processVideo() {
    const urlInput = document.getElementById('videoUrl').value.trim();
    const resultDiv = document.getElementById('result');
    
    if (!urlInput) {
        alert("Please enter a YouTube link!");
        return;
    }

    // Extracting Video ID
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = urlInput.match(regExp);
    
    if (match && match[2].length == 11) {
        const videoId = match[2];

        // Using a highly trusted widget system that handles downloads natively inside an isolated frame
        resultDiv.innerHTML = `
            <div class="dl-box">
                <h3 style="color:#00adb5; margin-top:0;">Your Video is Ready! 🥳</h3>
                <p style="font-size:14px; color:#aaa;">Choose your preferred format below to save directly:</p>
                
                <iframe src="https://button.yt/api/button/?url=https://www.youtube.com/watch?v=${videoId}&f=mp4" width="100%" height="60px" scrolling="no"></iframe>
                <iframe src="https://button.yt/api/button/?url=https://www.youtube.com/watch?v=${videoId}&f=mp3" width="100%" height="60px" scrolling="no"></iframe>
            </div>
        `;
    } else {
        resultDiv.innerHTML = "<p class='error'>Invalid YouTube link! Please try again.</p>";
    }
}
</script>

</body>
</html>

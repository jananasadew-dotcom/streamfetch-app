<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFetch - YouTube Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin: 0 auto;
        }
        h1 { color: #ff0000; margin-bottom: 5px; }
        .subtitle { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        input[type="text"] {
            width: 85%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #ff0000; }
        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #cc0000; }
        #result { margin-top: 30px; }
        .loading { color: #ffaa00; font-weight: bold; }
        .error { color: #ff3333; font-weight: bold; }
        
        /* Download Buttons Styling */
        .dl-box {
            background: #252525;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        .dl-link {
            display: block;
            background: #00adb5;
            color: #fff;
            padding: 12px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
        }
        .dl-link:hover { background: #008c95; }
        .dl-audio { background: #ff5722; }
        .dl-audio:hover { background: #e64a19; }
    </style>
</head>
<body>

<div class="container">
    <h1>StreamFetch</h1>
    <div class="subtitle">Download YouTube Videos and Music Instantly</div>
    
    <input type="text" id="videoUrl" placeholder="Paste YouTube video link here...">
    <br>
    <button onclick="fetchVideo()">Fetch Video</button>

    <div id="result"></div>
</div>

<script>
function fetchVideo() {
    const urlInput = document.getElementById('videoUrl').value.trim();
    const resultDiv = document.getElementById('result');
    
    if (!urlInput) {
        resultDiv.innerHTML = "<p class='error'>Please enter a YouTube link!</p>";
        return;
    }

    resultDiv.innerHTML = "<p class='loading'>Analyzing video connection. Please wait...</p>";

    // Extracting Video ID from URL
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = urlInput.match(regExp);
    
    if (match && match[2].length == 11) {
        const videoId = match[2];

        resultDiv.innerHTML = `
            <div class="dl-box">
                <h3 style="color:#00adb5; margin-top:0;">Your Video is Ready! 🥳</h3>
                <p style="font-size:14px; color:#aaa;">Click a button below to download directly from your site:</p>
                <div class="btn-group">
                    <a href="https://v3.mp3youtube.cc/download/${videoId}/mp4/720" target="_blank" class="dl-link">🎬 Download MP4 (HD Video)</a>
                    <a href="https://v3.mp3youtube.cc/download/${videoId}/mp4/360" target="_blank" class="dl-link" style="background:#007acc;">🎥 Download MP4 (360p Video)</a>
                    <a href="https://v3.mp3youtube.cc/download/${videoId}/mp3/128" target="_blank" class="dl-link dl-audio">🎵 Download MP3 (Audio)</a>
                </div>
            </div>
        `;
    } else {
        resultDiv.innerHTML = "<p class='error'>Invalid YouTube link! Please check and try again.</p>";
    }
}
</script>

</body>
</html>
